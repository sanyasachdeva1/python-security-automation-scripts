name: Python Security Script Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  python-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Check Python syntax
        run: |
          python -m py_compile scripts/log_anomaly_detector.py
          python -m py_compile scripts/ioc_checker.py
          python -m py_compile scripts/nmap_scan_parser.py
          python -m py_compile scripts/iam_policy_checker.py

      - name: Run tests
        run: |
          pytest tests/
