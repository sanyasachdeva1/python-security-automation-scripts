name: Python Security Script Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  python-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Python syntax
        run: |
          python -m py_compile scripts/log_anomaly_detector.py
          python -m py_compile scripts/ioc_checker.py
          python -m py_compile scripts/nmap_scan_parser.py
          python -m py_compile scripts/iam_policy_checker.py
          python -m py_compile scripts/soc_common.py
          python -m py_compile scripts/soc_triage.py
          python -m py_compile scripts/cloudtrail_analyzer.py
          python -m py_compile scripts/windows_event_analyzer.py
          python -m py_compile scripts/incident_timeline.py
          python -m py_compile scripts/rule_scanner.py
          python -m py_compile scripts/html_dashboard.py
          python -m py_compile scripts/case_manager.py
          python -m py_compile scripts/threat_intel_enricher.py
          python -m py_compile scripts/risk_scoring.py
          python -m py_compile scripts/soar_playbooks.py
          python -m py_compile scripts/input_collector.py

      - name: Run tests
        run: |
          pytest tests/
